<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Body Mass Index (BMI) Calculator</h1>
      <div id="form">
        <h3 id="report"></h3>
        <label for="height">YOUR HEIGHT (CM) </label><br />
        <input type="number" placeholder="150" id="height" /><br /><br />
        <label for="Weight">YOUR WEIGHT (KG)</label><br />
        <input type="number" placeholder="50" id="Weight" /><br /><br />
        <br />
        <br />
        <h1 id="text"></h1>
        <button class="Cal">CALCULATE</button>
      </div>
    </div>
    <script src="script.js"></script>

  </body>
</html>
